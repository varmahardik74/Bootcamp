<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body>
        <div style="display: flex; justify-content: space-between; padding: 0px 100px;">
            <div id="notes">
                Loading...
            </div>

            <div>
                <input type="text" id="userNote" />
                <button onclick="addTodo()">Create new note</button>
            </div>
        </div>
        <script>
            async function addTodo() {
                await axios.post("http://localhost:3000/notes", {
                    note: document.getElementById("userNote").value
                }, {
                    headers: {
                        token: localStorage.getItem("token")
                    }
                })

                // show the todo in the frontend
                const newNode = document.createElement("div");

                newNode.innerHTML = document.getElementById("userNote").value;
                newNode.setAttribute("style", "border: 2px solid black; padding: 10px;")
                document.getElementById("notes").appendChild(newNode);
                
                // make the input box empty again
                document.getElementById("userNote").value = "";
            }

            async function getTodos() {
                const response = await axios.get("http://localhost:3000/notes", {
                    headers: {
                        token: localStorage.getItem("token")
                    }
                });
                const notes = response.data.notes;

                document.getElementById("notes").innerHTML = "";

                for (let i = 0; i < notes.length; i++) {
                    const noteNote = document.createElement("div");
                    noteNote.innerHTML = notes[i].note;
                    noteNote.setAttribute("style", "border: 2px solid black; padding: 10px;")
                    document.getElementById("notes").appendChild(noteNote);
                }
            }

            getTodos();
        </script>
    </body>
</html>
