<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes app</title>
</head>

<body>
    <div style="display: flex; justify-content: space-between; padding: 0px 150px ">

        <div id="notes">
            loading...
        </div>

        <div>
            <input type="text" placeholder="write a new note" id="inputNote" >
            <button onclick="addTodo()">Create new note</button>
        </div>
    </div>
    <script>
            function addTodo(){
                axios.post("http://localhost:3000/notes", {
                    note : document.getElementById("inputNote").value
                })
                
                //To display the created note
                const newNote = document.createElement("div");
                newNote.innerHTML = document.getElementById("inputNote").value ;
                newNote.setAttribute("style", "border: 2px solid black; padding: 10px;")
                document.getElementById("notes").appendChild(newNote);
                
                document.getElementById("inputNote").value = "";
            }

        async function getTodos() {
            const response = await axios.get("http://localhost:3000/notes");
            const notes = response.data.notes;
            document.getElementById("notes").innerHTML = "";
            
            for (let i = 0; i < notes.length; i++) {
                const noteNote = document.createElement("div")
                noteNote.innerHTML = notes[i];
                noteNote.setAttribute("style", "border: 2px solid black; padding: 10px;")
                document.getElementById("notes").appendChild(noteNote);
            }
        }
        getTodos();
    </script>
</body>

</html>
