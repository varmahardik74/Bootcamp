<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }

    .login-box {
      width: 320px;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #dcdcdc;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      background: #fff;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 25px;
      color: #111;
    }

    .input-box {
      margin-bottom: 18px;
    }

    .input-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    .input-box input:focus {
      border-color: #2563eb;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #1d4ed8;
    }

    .bottom-text {
      margin-top: 15px;
      font-size: 13px;
      color: #444;
    }

    .bottom-text a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <div class="input-box">
      <input type="text" placeholder="Username">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Password">
    </div>

    <button class="login-btn">Login</button>

    <div class="bottom-text">
      Don’t have an account?
      <a href="./signup.html">Sign Up</a>
    </div>
  </div>

</body>
</html>
